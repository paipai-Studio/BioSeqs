name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-build-test:
    name: Check, Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache MoonBit toolchain
        id: cache-moonbit
        uses: actions/cache@v4
        with:
          path: ~/.moon
          key: ${{ runner.os }}-moonbit-toolchain

      - name: Setup MoonBit
        if: steps.cache-moonbit.outputs.cache-hit != 'true'
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check MoonBit version
        run: moon version

      - name: Cache MoonBit build
        uses: actions/cache@v4
        with:
          path: |
            **/.moon
            **/target
          key: ${{ runner.os }}-moonbit-build-${{ hashFiles('**/moon.mod', '**/moon.pkg') }}
          restore-keys: |
            ${{ runner.os }}-moonbit-build-

      - name: Moon check
        run: moon check

      - name: Moon build
        run: moon build

      - name: Moon test
        run: moon test --package IvanAXu/BioSeqs/test/moonbit
